<!doctype html>
<html lang="sl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="./assets/bird.png" />
  </head>
  <body>
    <div class="game-container">
      <div id="mainMenu" class="ui-layer">
        <h1 class="title">Flappy</h1>
        <p class="score-text">
          Best Score: <span id="bestScoreDisplay">0</span>
        </p>
        <p class="score-text" id="currentScoreDisplay" style="display: none">
          Score: <span id="lastScore">0</span>
        </p>
        <button id="startBtn">Start</button>
      </div>

      <canvas id="gameCanvas" width="288" height="512"></canvas>
    </div>

    <script src="script.js"></script>
  </body>
</html>
