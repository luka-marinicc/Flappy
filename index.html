<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/textures/bird.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
    <div id="menuBackground" class="retro-bg bg-surface" style="display: none;"></div>
    
    <div id="mainMenu" class="ui-layer">
        <div class="retro-box">
            <h1 class="title">Flappy</h1>
            
            <button id="startBtn" class="menu-btn primary-btn">START</button>
            <button id="openCampaignBtn" class="menu-btn campaign-btn">CAMPAIGN</button>
            <button id="openSettingsBtn" class="menu-btn secondary-btn">SETTINGS</button>
            <button id="openScoreBtn" class="menu-btn tertiary-btn">SCORES</button>
        </div>
    </div>

    <div id="campaignMenu" class="ui-layer" style="display: none;">
        <div class="retro-box">
            <h2 class="settings-title" id="worldTitle">SURFACE</h2>
            
            <div class="level-container">
                <div class="level-wrapper">
                    <button class="level-btn" id="lvlBtn1">LEVEL 1</button>
                    <div class="coin-display" id="coins1">
                        <div class="coin"></div><div class="coin"></div><div class="coin"></div>
                    </div>
                </div>
                <div class="level-wrapper">
                    <button class="level-btn" id="lvlBtn2">LEVEL 2</button>
                    <div class="coin-display" id="coins2">
                        <div class="coin"></div><div class="coin"></div><div class="coin"></div>
                    </div>
                </div>
                <div class="level-wrapper">
                    <button class="level-btn boss-btn" id="lvlBtn3">BOSS 3</button>
                    <div class="coin-display" id="coins3">
                        <div class="coin"></div><div class="coin"></div><div class="coin"></div>
                    </div>
                </div>
            </div>

            <div class="pagination">
                <button id="prevPageBtn" class="page-btn">&lt;</button>
                <span id="pageIndicator" class="page-text">1/3</span>
                <button id="nextPageBtn" class="page-btn">&gt;</button>
            </div>

            <button id="closeCampaignBtn" class="menu-btn primary-btn" style="margin-top: 2cqw;">BACK</button>
        </div>
    </div>

    <div id="campaignGameOverMenu" class="ui-layer" style="display: none;">
        <div class="retro-box">
            <h2 class="settings-title" style="color: #d11f1f;">GAME OVER</h2>
            <div class="progress-container">
                <p class="score-label" style="color: white; margin-bottom: 2cqw;">PROGRESS:</p>
                <p class="score-number" id="campaignProgressText">0%</p>
            </div>
            
            <button id="retryCampaignBtn" class="menu-btn secondary-btn" style="margin-top: 4cqw;">RETRY</button>
            <button id="campaignToMenuBtn" class="menu-btn primary-btn">MAIN MENU</button>
        </div>
    </div>

    <div id="levelCompleteMenu" class="ui-layer" style="display: none;">
        <div class="retro-box">
            <h2 class="settings-title" style="color: #ffd04b; font-size: 6cqw; line-height: 1.5;">LEVEL<br>COMPLETE!</h2>
            
            <div class="coin-display" style="margin: 4cqw 0 6cqw 0; background: transparent; padding: 0; box-shadow: none;">
                <div class="coin" id="victoryCoin0" style="width: 8cqw; height: 8cqw;"></div>
                <div class="coin" id="victoryCoin1" style="width: 8cqw; height: 8cqw;"></div>
                <div class="coin" id="victoryCoin2" style="width: 8cqw; height: 8cqw;"></div>
            </div>
            
            <button id="nextLevelBtn" class="menu-btn secondary-btn">NEXT LEVEL</button>
            <button id="victoryToMenuBtn" class="menu-btn primary-btn">MAIN MENU</button>
        </div>
    </div>

    <div id="scoreMenu" class="ui-layer" style="display: none;">
        <div class="retro-box">
            <h2 class="settings-title">SCORES</h2>
            
            <div class="score-board">
                <p class="score-label">BEST</p>
                <p class="score-number" id="bestScoreDisplay">0</p>
                
                <div id="currentScoreContainer" style="display: none;">
                    <p class="score-label" style="margin-top: 3cqw;">LAST SCORE</p>
                    <p class="score-number" id="lastScore">0</p>
                </div>
            </div>

            <button id="closeScoreBtn" class="menu-btn primary-btn" style="margin-top: 2cqw;">BACK</button>
        </div>
    </div>

    <div id="settingsMenu" class="ui-layer" style="display: none;">
        <div class="retro-box">
            <h2 class="settings-title">SETTINGS</h2>
            
            <div class="setting-item">
                <label>MUSIC VOLUME</label>
                <div class="retro-volume-control">
                    <button id="musicVolMinus" class="vol-btn">-</button>
                    <div class="vol-display">
                        <span id="musicVolumeValue">50</span>%
                    </div>
                    <button id="musicVolPlus" class="vol-btn">+</button>
                </div>
            </div>

            <div class="setting-item">
                <label>SFX VOLUME</label>
                <div class="retro-volume-control">
                    <button id="sfxVolMinus" class="vol-btn">-</button>
                    <div class="vol-display">
                        <span id="sfxVolumeValue">50</span>%
                    </div>
                    <button id="sfxVolPlus" class="vol-btn">+</button>
                </div>
            </div>

            <button id="closeSettingsBtn" class="menu-btn primary-btn" style="margin-top: 4cqw;">BACK</button>
        </div>
    </div>

    <div id="campaignUI" class="ui-layer" style="display: none; justify-content: flex-start; padding-top: 6cqw; pointer-events: none; background: transparent;">
        <div class="progress-bar-container">
            <div id="progressFill" class="progress-bar-fill"></div>
            <div class="progress-coin-marker" id="uiCoin0" style="left: 25%;"></div>
            <div class="progress-coin-marker" id="uiCoin1" style="left: 50%;"></div>
            <div class="progress-coin-marker" id="uiCoin2" style="left: 75%;"></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="288" height="512"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
